log_format gateway '$remote_addr - [$time_local] "$request" $status '
                   'org_id=$x_org_id token_prefix=$otlp_token_prefix '
                   'upstream=$upstream_addr bytes=$body_bytes_sent';

proxy_cache_path /tmp/auth_cache levels=1:2
                 keys_zone=auth_cache:1m
                 max_size=10m
                 inactive=120s;

map $http_x_otlp_token $otlp_token_prefix {
    default "-";
    "~^(?P<prefix>.{12})" "$prefix...";
}

server {
    listen 4320;
    listen [::]:4320;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;
    access_log /var/log/nginx/access.log gateway;
    set $x_org_id "-";
    client_max_body_size 16m;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    location /loki/ {
        auth_request /_validate_token;
        auth_request_set $x_org_id $upstream_http_x_org_id;

        proxy_set_header X-Scope-OrgID $x_org_id;
        proxy_set_header x-otlp-token  "";
        proxy_set_header Host          $host;

        set $upstream_loki http://loki:3100;
        rewrite ^/loki/(.*) /$1 break;
        proxy_pass $upstream_loki;
    }

    location /tempo/ {
        auth_request /_validate_token;
        auth_request_set $x_org_id $upstream_http_x_org_id;

        proxy_set_header X-Scope-OrgID $x_org_id;
        proxy_set_header x-otlp-token  "";
        proxy_set_header Host          $host;

        set $upstream_tempo http://tempo:4318;
        rewrite ^/tempo/(.*) /$1 break;
        proxy_pass $upstream_tempo;
    }

    location /mimir/ {
        auth_request /_validate_token;
        auth_request_set $x_org_id $upstream_http_x_org_id;

        proxy_set_header X-Scope-OrgID $x_org_id;
        proxy_set_header x-otlp-token  "";
        proxy_set_header Host          $host;

        set $upstream_mimir http://mimir:9009;
        rewrite ^/mimir/(.*) /$1 break;
        proxy_pass $upstream_mimir;
    }

    location = /_validate_token {
        internal;

        set $upstream_auth http://gateway-auth:4321;
        proxy_pass              $upstream_auth/api/gateway/validate;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Otlp-Token   $http_x_otlp_token;
        proxy_set_header        X-Original-URI  $request_uri;
        proxy_cache          auth_cache;
        proxy_cache_key      $http_x_otlp_token;
        proxy_cache_valid    200  60s;
        proxy_cache_valid    401  10s;
        proxy_cache_valid    any   5s;
    }
    
    location = /health {
        default_type application/json;
        return 200 '{"status":"healthy","service":"otlp-gateway"}';
    }

    location / {
        default_type application/json;
        return 404 '{"error":"Unknown route. Use /loki/, /tempo/, or /mimir/"}';
    }
}
