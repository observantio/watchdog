receivers:
  hostmetrics:
    collection_interval: 1s
    scrapers:
      cpu:

  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  resource/tenant:
    attributes:
      - key: tenant_id
        value: ${OTEL_AGENT_API_KEY}
        action: insert

exporters:
  kafka/logs:
    brokers: ["kafka:9092"]
    topic: otel-logs
    encoding: otlp_proto
    producer:
      max_message_bytes: 10485760
      compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

  kafka/metrics:
    brokers: ["kafka:9092"]
    topic: otel-metrics
    encoding: otlp_proto
    producer:
      max_message_bytes: 10485760
      compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

  kafka/traces:
    brokers: ["kafka:9092"]
    topic: otel-traces
    encoding: otlp_proto
    producer:
      max_message_bytes: 10485760
      compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

  debug:
    verbosity: normal



service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/tenant]
      exporters: [kafka/logs, debug]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/tenant]
      exporters: [kafka/traces, debug]

    metrics:
      receivers: [hostmetrics, otlp]
      processors: [memory_limiter, resource/tenant]
      exporters: [kafka/metrics, debug]

  telemetry:
    logs:
      level: info