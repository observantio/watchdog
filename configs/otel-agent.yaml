receivers:
  hostmetrics:
    collection_interval: 1s
    scrapers:
      cpu:
      memory:
      disk:
      filesystem:
      network:
      paging:
      process:
      system:

  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  
  resource:
    attributes:
      - key: tenant_id
        value: ${OTEL_AGENT_API_KEY}
        action: upsert

exporters:
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
    headers:
      X-Scope-OrgID: ${OTEL_AGENT_API_KEY}
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

  otlp/tempo:
    endpoint: "tempo:4317"
    headers:
      X-Scope-OrgID: ${OTEL_AGENT_API_KEY}
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

  prometheusremotewrite/mimir:
    endpoint: "http://mimir:9009/api/v1/push"
    headers:
      X-Scope-OrgID: ${OTEL_AGENT_API_KEY}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m

  debug:
    verbosity: normal

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource]
      exporters: [otlphttp/loki, debug]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [hostmetrics, otlp]
      processors: [memory_limiter, resource]
      exporters: [prometheusremotewrite/mimir, debug]

  telemetry:
    logs:
      level: info