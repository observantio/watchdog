receivers:
  hostmetrics:
    collection_interval: 60s
    scrapers:
      cpu:
      memory:
      disk:
      filesystem:
      network:
      paging:
      process:
      system:

  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

exporters:
  otlphttp/loki:
    endpoint: "http://otlp-gateway:4320/loki/otlp"
    headers:
      x-otlp-token: ${OTEL_OTLP_TOKEN}
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

  otlphttp/tempo:
    endpoint: "http://otlp-gateway:4320/tempo"
    headers:
      x-otlp-token: ${OTEL_OTLP_TOKEN}
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

  prometheusremotewrite/mimir:
    endpoint: "http://otlp-gateway:4320/mimir/api/v1/push"
    headers:
      x-otlp-token: ${OTEL_OTLP_TOKEN}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m

  debug:
    verbosity: normal

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter]
      exporters: [otlphttp/loki]

    traces:
      receivers: [otlp]
      processors: [memory_limiter]
      exporters: [otlphttp/tempo]

    metrics:
      receivers: [hostmetrics, otlp]
      processors: [memory_limiter]
      exporters: [prometheusremotewrite/mimir]

  telemetry:
    logs:
      level: info
