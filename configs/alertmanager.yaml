global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'watchdog-webhook'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'watchdog-webhook'
    webhook_configs:
      - url: 'http://notifier:4323/internal/v1/alertmanager/alerts/webhook'
        send_resolved: true
        http_config:
          follow_redirects: true
          authorization:
            type: Bearer
            credentials_file: /tmp/inbound_webhook_token

  - name: 'critical'
    webhook_configs:
      - url: 'http://notifier:4323/internal/v1/alertmanager/alerts/critical'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /tmp/inbound_webhook_token

  - name: 'warning'
    webhook_configs:
      - url: 'http://notifier:4323/internal/v1/alertmanager/alerts/warning'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /tmp/inbound_webhook_token

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
