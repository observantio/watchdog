
proxy_cache_path /var/cache/nginx/auth
  levels=1:2
  keys_zone=auth_cache:20m
  inactive=10m
  max_size=256m;

map $http_upgrade $connection_upgrade {
  default upgrade;
  ""      close;
}

map $cookie_watchdog_token $watchdog_auth_header {
  default "";
  "~.+"   "Bearer $cookie_watchdog_token";
}

map $http_authorization $final_auth_header {
  default $http_authorization;
  ""      $watchdog_auth_header;
}

map "$final_auth_header:$cookie_watchdog_token:$cookie_access_token" $missing_auth_credentials {
  default 0;
  "::"    1;
}

server {
  listen 80;
  absolute_redirect off;

  resolver 127.0.0.11 ipv6=off valid=10s;
  resolver_timeout 2s;
  set $watchdog_upstream watchdog:4319;
  set $grafana_upstream grafana:3000;

  location = /_auth {
    internal;

    if ($missing_auth_credentials) { return 401; }

    proxy_pass http://$watchdog_upstream/api/grafana/auth;

    proxy_pass_request_body off;
    proxy_set_header Content-Length "";

    proxy_set_header Authorization $final_auth_header;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Original-Method $request_method;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;

    proxy_connect_timeout 2s;
    proxy_send_timeout    5s;
    proxy_read_timeout    10s;
  }


  location ^~ /grafana/public/ {
    proxy_pass http://$grafana_upstream;
    proxy_set_header Host $host;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_redirect off;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ^~ /grafana/build/ {
    proxy_pass http://$grafana_upstream;
    proxy_set_header Host $host;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_redirect off;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ^~ /grafana/assets/ {
    proxy_pass http://$grafana_upstream;
    proxy_set_header Host $host;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_redirect off;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~* ^/grafana/.*\.(?:js|css|png|jpg|jpeg|svg|gif|ico|woff2?|ttf|map)$ {
    proxy_pass http://$grafana_upstream;
    proxy_set_header Host $host;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_redirect off;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /grafana/api/search {
    auth_request /_auth;

    rewrite ^/grafana/api/search$ /api/grafana/dashboards/search break;
    proxy_pass http://$watchdog_upstream;
    proxy_set_header Authorization $final_auth_header;
    proxy_set_header Cookie $http_cookie;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_connect_timeout 2s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location = /grafana/api/search/sorting {
    auth_request /_auth;

    auth_request_set $webauth_user   $upstream_http_x_webauth_user;
    auth_request_set $webauth_tenant $upstream_http_x_webauth_tenant;
    auth_request_set $webauth_role   $upstream_http_x_webauth_role;

    proxy_pass http://$grafana_upstream;
    proxy_set_header Host $host;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-WEBAUTH-USER   $webauth_user;
    proxy_set_header X-WEBAUTH-TENANT $webauth_tenant;
    proxy_set_header X-WEBAUTH-ROLE   $webauth_role;

    proxy_connect_timeout 2s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location = /grafana/api/datasources {
    auth_request /_auth;

    proxy_pass http://$watchdog_upstream/api/grafana/datasources;
    proxy_set_header Authorization $final_auth_header;
    proxy_set_header Cookie $http_cookie;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_connect_timeout 2s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location ^~ /grafana/api/datasources/name/ {
    auth_request /_auth;

    rewrite ^/grafana/api/datasources/name/(.+)$ /api/grafana/datasources/name/$1 break;
    proxy_pass http://$watchdog_upstream;
    proxy_set_header Authorization $final_auth_header;
    proxy_set_header Cookie $http_cookie;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_connect_timeout 2s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location = /grafana/api/ds/query {
    auth_request /_auth;

    proxy_pass http://$watchdog_upstream/api/grafana/ds/query;
    proxy_set_header Authorization $final_auth_header;
    proxy_set_header Cookie $http_cookie;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_connect_timeout 2s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  location ^~ /grafana/api/folders {
    auth_request /_auth;

    rewrite ^/grafana/api/folders(.*)$ /api/grafana/folders$1 break;
    proxy_pass http://$watchdog_upstream;
    proxy_set_header Authorization $final_auth_header;
    proxy_set_header Cookie $http_cookie;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_connect_timeout 2s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location = /grafana/api/dashboards/db {
    auth_request /_auth;

    rewrite ^/grafana/api/dashboards/db$ /api/grafana/dashboards/db break;
    proxy_pass http://$watchdog_upstream;
    proxy_set_header Authorization $final_auth_header;
    proxy_set_header Cookie $http_cookie;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_connect_timeout 2s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location = /grafana/api/dashboards/db/ {
    auth_request /_auth;

    rewrite ^/grafana/api/dashboards/db/$ /api/grafana/dashboards/db break;
    proxy_pass http://$watchdog_upstream;
    proxy_set_header Authorization $final_auth_header;
    proxy_set_header Cookie $http_cookie;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_connect_timeout 2s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location = /grafana/api/user/auth-tokens/rotate {
    auth_request /_auth;
    add_header Content-Type application/json;
    return 200 '{"message":"auth proxy session active"}';
  }

  location ^~ /grafana/api/ {
    auth_request /_auth;

    auth_request_set $webauth_user   $upstream_http_x_webauth_user;
    auth_request_set $webauth_tenant $upstream_http_x_webauth_tenant;
    auth_request_set $webauth_role   $upstream_http_x_webauth_role;

    proxy_pass http://$grafana_upstream;
    proxy_set_header Host $host;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    proxy_set_header X-WEBAUTH-USER   $webauth_user;
    proxy_set_header X-WEBAUTH-TENANT $webauth_tenant;
    proxy_set_header X-WEBAUTH-ROLE   $webauth_role;

    proxy_connect_timeout 2s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location /grafana/ {
    auth_request /_auth;

    auth_request_set $webauth_user   $upstream_http_x_webauth_user;
    auth_request_set $webauth_tenant $upstream_http_x_webauth_tenant;
    auth_request_set $webauth_role   $upstream_http_x_webauth_role;

    proxy_pass http://$grafana_upstream;
    proxy_set_header Host $host;

    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Forwarded-Port   $server_port;

    proxy_set_header X-WEBAUTH-USER   $webauth_user;
    proxy_set_header X-WEBAUTH-TENANT $webauth_tenant;
    proxy_set_header X-WEBAUTH-ROLE   $webauth_role;

    proxy_redirect off;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_buffering on;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;

    proxy_connect_timeout 2s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  location = /grafana/bootstrap {
    set $next_path $arg_next;
    if ($next_path = "") { set $next_path "/"; }
    if ($next_path !~ "^/") { set $next_path "/"; }
    return 302 /grafana$next_path;
  }
}
