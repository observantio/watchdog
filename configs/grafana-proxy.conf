map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map "$http_authorization:$http_cookie" $missing_auth_credentials {
    default 0;
    ":"    1;
}

map $cookie_beobservant_token $beobservant_auth_header {
    default "";
    "~.+" "Bearer $cookie_beobservant_token";
}

# Prefer Authorization header if present, otherwise use cookie
map $http_authorization $final_auth_header {
    default $http_authorization;
    "" $beobservant_auth_header;
}

server {
    listen 80;
    absolute_redirect off;

    # ------------------------------------------------------------------
    # Grafana behind /grafana/ with auth via FastAPI
    #
    # - Browser hits:        /grafana/...
    # - NGINX auth_request:  /_auth  -> FastAPI /api/grafana/auth
    # - NGINX injects:       X-WEBAUTH-* headers into request to Grafana
    # ------------------------------------------------------------------

    # FastAPI auth subrequest (JWT via Authorization header or auth cookie)
    location = /_auth {
        # Fast-fail if no auth material is present to reduce backend load.
        if ($missing_auth_credentials) { return 401; }

        internal;
        proxy_pass http://beobservant:4319/api/grafana/auth;

        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward bearer token if present
        proxy_set_header Authorization $http_authorization;
        # Forward cookies for browser navigation flows.
        proxy_set_header Cookie $http_cookie;
        # Forward original client URI so FastAPI can enforce per-resource scope.
        proxy_set_header X-Original-URI $orig_uri;
        # Forward original client method (auth_request subrequests use GET).
        proxy_set_header X-Original-Method $orig_method;
    }

    # Grafana UI/API
    # Route search and datasource listing through BeObservant for scoped results.
    location = /grafana/api/search {
        set $orig_uri $request_uri;
        set $orig_method $request_method;
        auth_request /_auth;

        proxy_pass http://beobservant:4319/api/grafana/dashboards/search;
        proxy_set_header Authorization $final_auth_header;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $orig_uri;
    }

    location = /grafana/api/datasources {
        set $orig_uri $request_uri;
        set $orig_method $request_method;
        auth_request /_auth;

        proxy_pass http://beobservant:4319/api/grafana/datasources;
        proxy_set_header Authorization $final_auth_header;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $orig_uri;
    }

    location ^~ /grafana/api/datasources/name/ {
        set $orig_uri $request_uri;
        set $orig_method $request_method;
        auth_request /_auth;

        rewrite ^/grafana/api/datasources/name/(.+)$ /api/grafana/datasources/name/$1 break;
        proxy_pass http://beobservant:4319;
        proxy_set_header Authorization $final_auth_header;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $orig_uri;
    }

    # Datasource query API used by dashboard panels/queries.
    # Route via BeObservant to enforce datasource visibility checks from payload.
    location = /grafana/api/ds/query {
        set $orig_uri $request_uri;
        set $orig_method $request_method;
        auth_request /_auth;

        proxy_pass http://beobservant:4319/api/grafana/ds/query;
        proxy_set_header Authorization $final_auth_header;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $orig_uri;
    }

    # Datasource resource endpoints (queries, metrics, etc.) - proxy directly to Grafana
    location ^~ /grafana/api/datasources/uid/ {
        set $orig_uri $request_uri;
        set $orig_method $request_method;
        auth_request /_auth;

        proxy_pass http://grafana:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Forward auth headers from /_auth
        auth_request_set $webauth_user   $upstream_http_x_webauth_user;
        auth_request_set $webauth_email  $upstream_http_x_webauth_email;
        auth_request_set $webauth_name   $upstream_http_x_webauth_name;
        auth_request_set $webauth_tenant $upstream_http_x_webauth_tenant;
        auth_request_set $webauth_role   $upstream_http_x_webauth_role;
        
        proxy_set_header X-WEBAUTH-USER   $webauth_user;
        proxy_set_header X-WEBAUTH-EMAIL  $webauth_email;
        proxy_set_header X-WEBAUTH-NAME   $webauth_name;
        proxy_set_header X-WEBAUTH-TENANT $webauth_tenant;
        proxy_set_header X-WEBAUTH-ROLE   $webauth_role;
    }

    location /grafana/ {
        set $orig_uri $request_uri;
        set $orig_method $request_method;
        auth_request /_auth;

        # Capture headers from FastAPI auth response
        auth_request_set $webauth_user   $upstream_http_x_webauth_user;
        auth_request_set $webauth_email  $upstream_http_x_webauth_email;
        auth_request_set $webauth_name   $upstream_http_x_webauth_name;
        auth_request_set $webauth_tenant $upstream_http_x_webauth_tenant;
        auth_request_set $webauth_role   $upstream_http_x_webauth_role;

        proxy_pass http://grafana:3000;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_redirect http://grafana:3000/ $scheme://$http_host/grafana/;
        proxy_redirect http://localhost:3000/ $scheme://$http_host/grafana/;

        # Grafana auth.proxy headers
        proxy_set_header X-WEBAUTH-USER   $webauth_user;
        proxy_set_header X-WEBAUTH-EMAIL  $webauth_email;
        proxy_set_header X-WEBAUTH-NAME   $webauth_name;
        proxy_set_header X-WEBAUTH-TENANT $webauth_tenant;
        proxy_set_header X-WEBAUTH-ROLE   $webauth_role;

        # WebSockets (Grafana Live)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Avoid buffering large responses unnecessarily
        proxy_buffering off;
    }

    # Legacy bootstrap endpoint retained only for path normalization/redirect.
    # Token handling is intentionally removed; bootstrap now happens server-side
    # via /api/grafana/bootstrap-session which sets HttpOnly cookie.
    location = /grafana/bootstrap {
        set $next_path $arg_next;
        if ($next_path = "") {
            set $next_path "/";
        }
        if ($next_path !~ "^/") {
            set $next_path "/";
        }
        return 302 /grafana$next_path;
    }
}
