global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'watchdog'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - localhost:9090

  - job_name: 'otel-collector'
    static_configs:
      - targets:
          - otel-agent:8888

  - job_name: 'otel-ingesters'
    static_configs:
      - targets: ['otel-ingester:8889']
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: '$1'

  - job_name: 'otel-ingester-exported'
    static_configs:
      - targets: ['otel-ingester:8889']
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: '$1'

  - job_name: 'alertmanager'
    static_configs:
      - targets:
          - alertmanager:9093