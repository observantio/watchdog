static_resources:
  listeners:
    - name: otlp_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 4320
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: otlp_gateway
                use_remote_address: true
                stream_idle_timeout: 300s
                request_timeout: 60s
                route_config:
                  name: routes
                  virtual_hosts:
                    - name: otlp
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/loki/" }
                          route:
                            cluster: loki
                            prefix_rewrite: "/"
                            timeout: 60s
                            retry_policy:
                              retry_on: connect-failure,reset,retriable-status-codes
                              retriable_status_codes: [503]
                              num_retries: 2
                        - match: { prefix: "/tempo/" }
                          route:
                            cluster: tempo
                            prefix_rewrite: "/"
                            timeout: 60s
                            retry_policy:
                              retry_on: connect-failure,reset,retriable-status-codes
                              retriable_status_codes: [503]
                              num_retries: 2
                        - match: { prefix: "/mimir/" }
                          route:
                            cluster: mimir
                            prefix_rewrite: "/"
                            timeout: 60s
                            retry_policy:
                              retry_on: connect-failure,reset,retriable-status-codes
                              retriable_status_codes: [503]
                              num_retries: 2
                        - match: { prefix: "/health" }
                          direct_response:
                            status: 200
                            body:
                              inline_string: '{"status":"healthy","service":"otlp-gateway"}'
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      http_service:
                        server_uri:
                          uri: http://gateway-auth:4321
                          cluster: gateway-auth
                          timeout: 2s
                        path_prefix: /api/gateway/validate
                        authorization_request:
                          headers_to_add:
                            - key: X-Otlp-Token
                              value: "%REQ(X-OTLP-TOKEN)%"
                        authorization_response:
                          allowed_upstream_headers:
                            patterns:
                              - exact: x-scope-orgid
                      failure_mode_allow: false
                      status_on_error:
                        code: ServiceUnavailable
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: gateway-auth
      connect_timeout: 2s
      type: logical_dns
      lb_policy: round_robin
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 50
            max_requests: 200
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50
      load_assignment:
        cluster_name: gateway-auth
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: gateway-auth
                      port_value: 4321

    - name: loki
      connect_timeout: 5s
      type: logical_dns
      lb_policy: round_robin
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 200
            max_pending_requests: 100
            max_requests: 400
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
      load_assignment:
        cluster_name: loki
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: loki
                      port_value: 3100

    - name: tempo
      connect_timeout: 5s
      type: logical_dns
      lb_policy: round_robin
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 200
            max_pending_requests: 100
            max_requests: 400
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
      load_assignment:
        cluster_name: tempo
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: tempo
                      port_value: 4318

    - name: mimir
      connect_timeout: 5s
      type: logical_dns
      lb_policy: round_robin
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 200
            max_pending_requests: 100
            max_requests: 400
      upstream_connection_options:
        tcp_keepalive:
          keepalive_time: 60
      load_assignment:
        cluster_name: mimir
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: mimir
                      port_value: 9009

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901