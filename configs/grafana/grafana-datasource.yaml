apiVersion: 1

datasources:
  - name: Mimir
    uid: mimir
    type: prometheus
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: ${MIMIR_TENANT_ID}