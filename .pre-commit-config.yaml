repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: ^(node_modules/|ui/dist/)

  - repo: local
    hooks:
      - id: pip-audit-server
        name: pip-audit (server)
        entry: bash -lc 'cd server && python -m pip_audit -r requirements.txt'
        language: system
        pass_filenames: false

      - id: npm-audit-ui
        name: npm audit (ui)
        entry: bash -lc 'cd ui && npm audit --audit-level=high'
        language: system
        pass_filenames: false
