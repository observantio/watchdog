name: Publish Service Image

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      - name: Normalize owner for GHCR
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ github.event.repository.name }}:${{ env.VERSION }}

      - name: Extract changelog entry for this version
        run: |
          set -euo pipefail
          extract_section() {
            local file="$1"
            local version="$2"
            local label="$3"
            if [ ! -f "$file" ]; then
              echo "Missing changelog file: $file" >&2
              return 1
            fi
            if ! awk -v version="$version" '
              BEGIN { in_section=0; found=0 }
              /^## \[/ {
                if ($0 ~ "^## \\[" version "\\]") {
                  in_section=1
                  found=1
                  print
                  next
                }
                if (in_section==1) exit
              }
              in_section==1 { print }
              END { exit(found ? 0 : 1) }
            ' "$file" > "/tmp/changelog-${label}.md"; then
              echo "No changelog entry found for ${label} version ${version} in ${file}" >&2
              return 1
            fi
          }

          notifier_version="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("release/versions.json").read_text(encoding="utf-8"))["notifier"])
          PY
          )"
          resolver_version="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("release/versions.json").read_text(encoding="utf-8"))["resolver"])
          PY
          )"

          extract_section "CHANGELOG.md" "${VERSION}" "bundle"
          extract_section "notifier/CHANGELOG.md" "${notifier_version}" "notifier"
          extract_section "resolver/CHANGELOG.md" "${resolver_version}" "resolver"

          {
            echo "# Bundle ${VERSION}"
            cat /tmp/changelog-bundle.md
            echo
            echo "# Notifier ${notifier_version}"
            cat /tmp/changelog-notifier.md
            echo
            echo "# Resolver ${resolver_version}"
            cat /tmp/changelog-resolver.md
          } > release-notes.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: release-notes.md
