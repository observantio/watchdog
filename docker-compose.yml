networks:
  obs:
    driver: bridge

volumes:
  mimir:
  grafana:
  alertmanager:
  beobservant_data:
  postgres_data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beobservant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234567890}
      POSTGRES_DB: beobservant
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [obs]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beobservant"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  otel-agent:
    image: otel/opentelemetry-collector-contrib:0.145.0
    command: ["--config=/etc/otel/agent.yaml"]
    volumes:
      - ./configs/otel-agent.yaml:/etc/otel/agent.yaml:ro
    environment:
      OTEL_AGENT_API_KEY: "${OTEL_AGENT_API_KEY:-Av45ZchZsQdKjN8XyG}"
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
      mimir:
        condition: service_started
    networks: [obs]
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  chaos-stress:
    image: alpine:latest
    command: >
      sh -c "apk add --no-cache stress-ng &&
             while true; do
               WAIT=$$((60 + RANDOM % 120));
               echo \"Waiting $${WAIT}s before next stress...\";
               sleep $$WAIT;
               echo 'Starting 45s stress on OTel agent container...';
               stress-ng --cpu 2 --vm 1 --vm-bytes 384M --timeout 45s --metrics-brief || true;
             done"
    pid: "container:beobservant-otel-agent-1"
    depends_on:
      - otel-agent
    networks: [obs]
    restart: unless-stopped

  trace-generator:
    image: alpine:latest
    network_mode: host
    volumes:
      - ./tests/traces.sh:/app/script.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: >
      sh -c "apk add --no-cache bash docker-cli openssl &&
             bash script.sh"
    depends_on:
      - otel-agent
    restart: unless-stopped

  log-generator:
    image: alpine:latest
    network_mode: host
    volumes:
      - ./tests/logs.sh:/app/script.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: >
      sh -c "apk add --no-cache bash docker-cli &&
             bash script.sh"
    depends_on:
      - otel-agent
    restart: unless-stopped

  loki:
    image: grafana/loki:3.6.5
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./configs/loki.yaml:/etc/loki/loki.yaml:ro
    networks: [obs]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.1
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./configs/tempo.yaml:/etc/tempo/tempo.yaml:ro
    networks: [obs]
    restart: unless-stopped

  beobservant:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      BACKUP_ENABLED: "${BACKUP_ENABLED:-false}"
      S3_BUCKET: "${S3_BUCKET:-beobservant-backup}"
      S3_PREFIX: "${S3_PREFIX:-metrics}"
      BACKUP_INTERVAL: "${BACKUP_INTERVAL:-3600}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      STORAGE_DIR: "/data/beobservant"
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:-}"
      DATABASE_URL: "postgresql://beobservant:${POSTGRES_PASSWORD:-1234567890}@postgres:5432/beobservant"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-this-secret-key-in-production}"
      DEFAULT_ADMIN_USERNAME: "${DEFAULT_ADMIN_USERNAME:-admin}"
      DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD:-admin123}"
      DEFAULT_ADMIN_EMAIL: "${DEFAULT_ADMIN_EMAIL:-admin@example.com}"
      DEFAULT_ORG_ID: "${DEFAULT_ORG_ID:-Av45ZchZsQdKjN8XyG}"
    ports:
      - "4319:4319"
    volumes:
      - beobservant_data:/data/beobservant
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks: [obs]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4319/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mimir:
    image: grafana/mimir:2.12.0
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - ./configs/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir:/data
    depends_on:
      - alertmanager
    networks: [obs]
    ports:
      - "9009:9009"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./configs/alertmanager.yaml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks: [obs]
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      MIMIR_TENANT_ID: "${MIMIR_TENANT_ID:-default}"
    volumes:
      - ./configs/grafana/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - mimir
      - loki
      - tempo
    networks: [obs]
    restart: unless-stopped