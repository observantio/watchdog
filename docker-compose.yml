networks:
  obs:
    driver: bridge

volumes:
  kafka:
  prometheus:
  grafana:
  alertmanager:
  beobservant_data:

services:
  kafka:
    image: apache/kafka:4.1.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [obs]
    restart: unless-stopped

  otel-agent:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel/agent.yaml"]
    volumes:
      - ./configs/otel-agent.yaml:/etc/otel/agent.yaml:ro
    environment:
      OTEL_AGENT_query_logsKEY: "${OTEL_AGENT_API_KEY:-public}"
    depends_on:
      kafka:
        condition: service_healthy
    networks: [obs]
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

  otel-ingester:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel/ingester.yaml"]
    volumes:
      - ./configs/otel-ingester.yaml:/etc/otel/ingester.yaml:ro
    depends_on:
      kafka:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
      beobservant:
        condition: service_started
    deploy:
      replicas: 2
    networks: [obs]
    restart: unless-stopped

  loki:
    image: grafana/loki:3.6.5
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./configs/loki.yaml:/etc/loki/loki.yaml:ro
    networks: [obs]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.1
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./configs/tempo.yaml:/etc/tempo/tempo.yaml:ro
    networks: [obs]
    restart: unless-stopped

  beobservant:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      BACKUP_ENABLED: "${BACKUP_ENABLED:-false}"
      S3_BUCKET: "${S3_BUCKET:-beobservant-backup}"
      S3_PREFIX: "${S3_PREFIX:-metrics}"
      BACKUP_INTERVAL: "${BACKUP_INTERVAL:-3600}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      STORAGE_DIR: "/data/beobservant"
      DATA_ENCRYPTION_KEY: "${DATA_ENCRYPTION_KEY:-}"
    ports:
      - "4319:4319"
    volumes:
      - beobservant_data:/data/beobservant
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks: [obs]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4319/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./configs/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./configs/rules/alerts.yaml:/etc/prometheus/alerts.yml:ro
      - prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - beobservant
      - alertmanager
    networks: [obs]
    ports:
      - "9090:9090"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./configs/alertmanager.yaml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks: [obs]
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./configs/grafana/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks: [obs]
    restart: unless-stopped