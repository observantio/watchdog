name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  ui:
    name: UI build, test, lint, a11y
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies (with optional native deps)
        run: |
          npm ci --include=optional
          npm ls @rollup/rollup-linux-x64-gnu >/dev/null 2>&1 || npm i --no-save @rollup/rollup-linux-x64-gnu
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --run

  server:
    name: Gateway (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BeGateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Run Gateway tests
        run: pytest -q
        server:

    name: Server tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BeObservant
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Run server tests
        run: pytest -q
